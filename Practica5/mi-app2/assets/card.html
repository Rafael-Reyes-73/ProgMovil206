<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UX/UI Designer Card</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            /* Fondo oscuro con textura sutil para resaltar la tarjeta, igual que en tu imagen */
            background-color: #151515;
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        .card-container {
            position: relative;
            width: 320px;
            height: 500px;
            /* Una sombra ligera para darle profundidad */
            filter: drop-shadow(0px 10px 30px rgba(0, 0, 0, 0.5));
        }

        .card-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .card-content {
            position: relative;
            z-index: 2;
            padding: 35px 25px 25px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            box-sizing: border-box;
        }

        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .time {
            font-size: 13px;
            font-weight: 500;
            color: #2b3a28;
            margin-top: 8px;
        }

        .bookmark-btn {
            background-color: rgba(0, 0, 0, 0.05);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .bookmark-btn:hover {
            background-color: rgba(0, 0, 0, 0.1);
        }

        .logo-box {
            background-color: #2D2D2D;
            width: 76px;
            height: 76px;
            border-radius: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
        }

        .title {
            font-size: 22px;
            font-weight: 700;
            color: #111;
            margin: 20px 0 8px 0;
        }

        .location {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 500;
            color: #4a7a42;
        }

        .divider {
            width: 100%;
            height: 1px;
            background-color: rgba(0, 0, 0, 0.06);
            border: none;
            margin: 18px 0;
        }

        .tags {
            display: flex;
            justify-content: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #2c4a25;
        }

        .description {
            text-align: center;
            font-size: 13px;
            line-height: 1.5;
            color: #456b3e;
            margin: 5px 10px auto 10px;
        }

        .apply-btn {
            background-color: #111;
            color: #fff;
            border: none;
            width: 85%;
            padding: 16px 0;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }

        .apply-btn:hover {
            background-color: #000;
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <div class="card-container">
        <svg class="card-bg" viewBox="0 0 320 500" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M 40,15 
                     Q 160,30 280,15 
                     A 25,25 0 0,1 305,40 
                     Q 290,250 305,460 
                     A 25,25 0 0,1 280,485 
                     Q 160,470 40,485 
                     A 25,25 0 0,1 15,460 
                     Q 30,250 15,40 
                     A 25,25 0 0,1 40,15 Z" 
                  fill="#B7F2A2" />
        </svg>

        <div class="card-content">
            
            <div class="header">
                <span class="time">8h ago</span>
                <div class="bookmark-btn">
                    <svg width="12" height="14" viewBox="0 0 12 14" fill="#111" xmlns="http://www.w3.org/2000/svg">
                        <path d="M1 1C1 0.447715 1.44772 0 2 0H10C10.5523 0 11 0.447715 11 1V13.5L6 10.5L1 13.5V1Z"/>
                    </svg>
                </div>
            </div>

            <div class="logo-box">
                <svg width="34" height="50" viewBox="0 0 40 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 0H10C4.47715 0 0 4.47715 0 10C0 15.5228 4.47715 20 10 20H20V0Z" fill="#F24E1E"/>
                    <path d="M20 0H30C35.5228 0 40 4.47715 40 10C40 15.5228 35.5228 20 30 20H20V0Z" fill="#FF7262"/>
                    <path d="M20 20H10C4.47715 20 0 24.4772 0 30C0 35.5228 4.47715 40 10 40H20V20Z" fill="#A259FF"/>
                    <path d="M20 20H30C35.5228 20 40 24.4772 40 30C40 35.5228 35.5228 40 30 40H20V20Z" fill="#1ABCFE"/>
                    <path d="M10 40C4.47715 40 0 44.4772 0 50C0 55.5228 4.47715 60 10 60C15.5228 60 20 55.5228 20 50V40H10Z" fill="#0ACF83"/>
                </svg>
            </div>

            <h2 class="title">UX/UI Designer</h2>
            
            <div class="location">
                <svg width="14" height="16" viewBox="0 0 14 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M7 1C4.23858 1 2 3.23858 2 6C2 9.5 7 15 7 15C7 15 12 9.5 12 6C12 3.23858 9.76142 1 7 1Z" stroke="#4a7a42" stroke-width="1.5" stroke-linejoin="round"/>
                    <circle cx="7" cy="6" r="2" stroke="#4a7a42" stroke-width="1.5"/>
                </svg>
                New York, US
            </div>

            <hr class="divider">

            <div class="tags">
                <span>• Full Time</span>
                <span>• Remote</span>
                <span>• $130k/Yr</span>
            </div>

            <hr class="divider">

            <p class="description">Currently we are in need of<br>UI UX Designers to complete...</p>

            <button class="apply-btn">Apply Now</button>

        </div>
    </div>

</body>
